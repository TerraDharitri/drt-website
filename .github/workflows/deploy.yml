name: Force Deploy React App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Build React App
      run: npm run build

    - name: Deploy to GitHub Pages (Force Update)
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        # Initialize a clean gh-pages deployment
        npx gh-pages -d build --remote "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git" --remove "*.html" --remove "*.js" --remove "*.css" --remove "*.json" --remove "static/*"
